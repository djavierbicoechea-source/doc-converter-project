<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Doc Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="bg-gradient"></div>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Doc Converter</a>
    
  </div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="glass-card p-4 p-md-5 shadow-lg">
        <h1 class="display-6 fw-bold mb-2">Convertissez tes documents</h1>
        <p class="text-secondary mb-4">PDF ↔ Word • PDF → Excel • Preview • Download • Share</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form method="post" action="/convert" enctype="multipart/form-data" class="vstack gap-3">
          <div>
            <label class="form-label fw-semibold">Fichier</label>
            <input class="form-control form-control-lg" type="file" name="file" required>
            <div class="form-text">Formats supportés: PDF ou DOCX selon la conversion choisie.</div>
          </div>

          <div>
            <label class="form-label fw-semibold">Conversion</label>
            <select class="form-select form-select-lg" name="type" required>
              <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
            </select>
          </div>

          <button class="btn btn-primary btn-lg w-100 fw-semibold">
            Convertir maintenant
          </button>
        </form>

        <hr class="my-4">

        <div class="small text-secondary">
          
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
