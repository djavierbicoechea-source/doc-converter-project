<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Résultat - Doc Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="page-shell">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand brand-lockup" href="/" aria-label="Accueil Doc Converter">
        <span class="brand-mark">DC</span>
        <span>
          <span class="brand-title">Doc Converter</span>
          <small class="brand-subtitle">Résultat de conversion</small>
        </span>
      </a>
      <a class="btn app-secondary-btn" href="/">Nouvelle conversion</a>
    </div>
  </nav>

  <main class="container main-area result-area">
    <div class="row g-4">
      <div class="col-lg-5">
        <section class="converter-panel shadow-lg h-100">
          <div class="panel-header mb-4">
            <div>
              <span class="step-badge">02</span>
              <h1 class="result-title">Document prêt</h1>
            </div>
            <span class="status-dot success">Terminé</span>
          </div>

          <div class="file-summary">
            <div class="file-row">
              <span>Source</span>
              <strong th:text="${uploadedName}"></strong>
            </div>
            <div class="file-row">
              <span>Sortie</span>
              <strong th:text="${outName}"></strong>
            </div>
          </div>

          <div class="d-grid gap-3 action-stack">
            <a class="btn app-primary-btn btn-lg" th:href="${downloadUrl}">Télécharger le fichier</a>

            <button class="btn app-outline-btn btn-lg" type="button"
                    th:attr="data-copy=${downloadUrl}" onclick="copyLink(this)">
              Copier le lien
            </button>

            <div class="share-grid">
              <a class="btn app-whatsapp-btn" th:href="${whatsAppShare}" target="_blank">WhatsApp</a>
              <a class="btn app-telegram-btn" th:href="${telegramShare}" target="_blank">Telegram</a>
            </div>
          </div>
        </section>
      </div>

      <div class="col-lg-7">
        <section class="preview-panel shadow-lg h-100">
          <div class="preview-header">
            <div>
              <span class="eyebrow">Aperçu</span>
              <h2>Prévisualisation du résultat</h2>
            </div>
          </div>

          <div th:if="${outExt == 'pdf'}">
            <iframe class="preview-frame" th:src="${inlineUrl}" title="Prévisualisation PDF"></iframe>
          </div>

          <div th:if="${outExt != 'pdf'}">
            <pre class="preview-text" th:text="${previewText}"></pre>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
