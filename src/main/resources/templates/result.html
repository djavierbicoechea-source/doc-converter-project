<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Résultat - Doc Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="bg-gradient"></div>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Doc Converter</a>
    <a class="btn btn-sm btn-light" href="/">Nouvelle conversion</a>
  </div>
</nav>

<main class="container py-5">
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="glass-card p-4 shadow-lg">
        <h2 class="h4 fw-bold mb-3">Résultat</h2>

        <div class="mb-2"><span class="text-secondary">Source:</span> <span th:text="${uploadedName}"></span></div>
        <div class="mb-3"><span class="text-secondary">Sortie:</span> <span th:text="${outName}"></span></div>

        <div class="d-grid gap-2">
          <a class="btn btn-primary btn-lg" th:href="${downloadUrl}">⬇️ Télécharger</a>

          <button class="btn btn-outline-light btn-lg" type="button"
                  th:attr="data-copy=${downloadUrl}" onclick="copyLink(this)">
            📋 Copier le lien
          </button>

          <a class="btn btn-success btn-lg" th:href="${whatsAppShare}" target="_blank">📲 WhatsApp</a>
          <a class="btn btn-info btn-lg text-white" th:href="${telegramShare}" target="_blank">✈️ Telegram</a>
        </div>

       
      </div>
    </div>

    <div class="col-lg-7">
      <div class="glass-card p-4 shadow-lg">
        <h3 class="h5 fw-bold mb-3">Prévisualisation</h3>

        <div th:if="${outExt == 'pdf'}">
          <iframe class="preview-frame" th:src="${inlineUrl}"></iframe>
        </div>

        <div th:if="${outExt != 'pdf'}">
          <pre class="preview-text" th:text="${previewText}"></pre>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
